[env:cyd_esp32_2432s028]
platform = espressif32
board = esp32dev
framework = arduino

monitor_speed = 115200
upload_speed  = 921600

build_flags =
    -D USER_SETUP_LOADED
    -D ILI9341_DRIVER
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=320

    -D TFT_MISO=12
    -D TFT_MOSI=13
    -D TFT_SCLK=14
    -D TFT_CS=15
    -D TFT_DC=2
    -D TFT_RST=4
    -D TFT_BL=21

    -D TOUCH_CS=33
    -D TOUCH_IRQ=36

    -D SPI_FREQUENCY=40000000

    -D LOAD_GLCD
    -D LOAD_FONT2
    -D LOAD_FONT4
    -D LOAD_FONT6
    -D LOAD_FONT7
    -D LOAD_FONT8
    -D LOAD_GFXFF


